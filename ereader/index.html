<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/output.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tongues-reader</title>
    <script type="module" src="/src/main.ts" defer></script>
    <style>
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .more-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      p {
        font-family: Matina, sans-serif;
        font-size: 26px;
      }

      #book-container {
        max-height: 100vh;
        overflow-y: auto;
      }
    </style>
  </head>

  <body overflow-hidden m-0>
    <div class="flex justify-center items-center box-border h-screen w-screen overflow-hidden">
      <div id="open-spinner" class="spinner hidden"></div>

      <div id="open-container" class="flex justify-center items-center w-screen h-screen">
        <button id="open-button" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 box-border">Open Book</button>
      </div>

      <div id="book-container" class="hidden flex w-full h-full fixed p-10 overflow-hidden">
        <button id="close-button" class="fixed top-2.5 right-2.5 text-2xl bg-transparent border-none cursor-pointer z-50">&times;</button>
        <button id="prev-button" class="fixed top-1/2 left-0 text-black p-2 border-none cursor-pointer text-2xl z-100 box-border">&lt;</button>
        <button id="next-button" class="fixed top-1/2 right-0 text-black p-2 border-none cursor-pointer text-2xl z-100 box-border">&gt;</button>
        <div id="content-container" class="overflow-hidden">
          <div id="content"></div>
        </div>
      </div>

      <div id="translation-modal" class="hidden fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center z-50 overflow-hidden">
        <div id="inner-modal" class="bg-white p-6 rounded-lg shadow-lg box-border max-h-[80%] max-w-[50%] overflow-auto" onclick="event.stopPropagation()">
          <div id="spinner" class="spinner"></div>
          <div id="modal-content" class="flex-col gap-4 overflow-auto">
            <div class="flex flex-wrap gap-2 text-2xl" id="original-text"></div>
            <p id="translation-text" class="text-xl"></p>
            <div class="flex">
              <button id="play-button" class="mt-4 mr-2 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 focus:outline-none box-border">
                Play
              </button>
              <button id="more-button" class="mt-4 mr-2 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 focus:outline-none box-border">
                More
              </button>
              <button id="more-button-spinner" class="mt-4 mr-2 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 focus:outline-none box-border hidden">
                <div id="more-spinner" class="more-spinner"></div>
              </button>
            </div>
            <p id="text-info"></p>
          </div>
        </div>
      </div>


      <div id="language-select" class="hidden fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center overflow-hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg box-border">
          <h2 class="text-xl font-bold mb-4">Select Language</h2>
          <select id="language-dropdown" class="w-full p-2 mb-4 border rounded box-border">
            <option value="">Choose a language</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
          <button id="lang-select-btn" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600 box-border">
            Start Reading
          </button>
        </div>
      </div>
    </div>
  </body>


</html>
