<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/output.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tongues-reader</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="mx-auto p-4">
      <div id="open-container" class="flex justify-between items-center mb-6">
        <button id="open-button" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
          Open EPUB
        </button>
      </div>

      <div id="book-container">
        <div class="gap-6">
          <aside class="hidden w-64 shrink-0">
            <h2 class="text-xl font-bold mb-4">Chapters</h2>
            <nav class="space-y-2" id="chapters-nav"></nav>
          </aside>

          <main class="flex-1">
            <div id="content-container">
            </div>
          </main>
        </div>

        <div id="spinner" style="display: none;"></div>

        <div id="translation-modal" class="fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center z-50" onclick="closeTranslationModal(event)" style="display: none;">
          <div class="bg-white p-6 rounded-lg shadow-lg" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-4">Translation</h2>
            <p id="original-text"></p>
            <p id="translation-text"></p>
            <button class="mt-4 mr-2 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 focus:outline-none">
              Play
            </button>
          </div>
        </div>

        <div id="language-select" class="fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center" style="display: none;">
          <div class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4">Select Language</h2>
            <select
              id="language-dropdown"
              class="w-full p-2 mb-4 border rounded"
            >
              <option value="">Choose a language</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
            </select>
            <button onclick="handleLanguageSelect()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
              Start Reading
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
